services:
  grader:
    build: .
    ports:
      - "8081:8081"
    read_only: true
    tmpfs:
      - /tmp:uid=10001,gid=10001,mode=1777
      - /work:exec,size=512m,uid=10001,gid=10001,mode=1777
      - /run:uid=10001,gid=10001,mode=755
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
